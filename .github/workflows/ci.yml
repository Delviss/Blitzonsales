name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install workspace deps
        run: npm ci

      - name: Lint
        run: npm run lint

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & build shared
        working-directory: packages/shared
        run: npm ci && npm run build

      - name: Install API deps
        working-directory: apps/api
        run: npm ci

      - name: Type-check API
        working-directory: apps/api
        run: npx tsc --noEmit

      - name: Run API unit tests
        working-directory: apps/api
        run: npm test

      - name: Build API
        working-directory: apps/api
        run: npm run build

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & build shared
        working-directory: packages/shared
        run: npm ci && npm run build

      - name: Install web deps
        working-directory: apps/web
        run: npm ci

      - name: Build web
        working-directory: apps/web
        run: npm run build
        env:
          VITE_BASE_PATH: /Blitzonsales/
          VITE_API_URL: ''

  # Verifies the documented "one command" local setup: builds the compose
  # stack from scratch and logs in through the nginx proxy, exactly like a
  # user following the README on their own machine.
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start full stack
        run: docker compose up -d --build

      - name: Wait for login through the web proxy
        run: |
          for i in $(seq 1 60); do
            body=$(curl -s -X POST http://localhost:8080/api/auth/login \
              -H 'Content-Type: application/json' \
              -d '{"email":"admin@blitzon.de","password":"BlitzDev2026!"}') || true
            if echo "$body" | grep -q accessToken; then
              echo "Login OK"; exit 0
            fi
            sleep 5
          done
          echo "Login never succeeded. Last response: $body"
          exit 1

      - name: Web app is served
        run: curl -sf http://localhost:8080/ | grep -qi '<div id="root">'

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

  migrate-and-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: blitzonsales
          POSTGRES_USER: blitz
          POSTGRES_PASSWORD: blitzdev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://blitz:blitzdev@localhost:5432/blitzonsales
      JWT_SECRET: ci-test-secret
      REQUIRE_2FA: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & build shared
        working-directory: packages/shared
        run: npm ci && npm run build

      - name: Install API deps
        working-directory: apps/api
        run: npm ci

      - name: Run migrations against a clean database
        working-directory: apps/api
        run: npm run migration:run

      - name: Seed fixtures
        working-directory: apps/api
        run: npm run seed

      - name: Run end-to-end tests
        working-directory: apps/api
        run: npm run test:e2e
