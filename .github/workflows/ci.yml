name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & build shared
        working-directory: packages/shared
        run: npm ci && npm run build

      - name: Install API deps
        working-directory: apps/api
        run: npm ci

      - name: Run API tests
        working-directory: apps/api
        run: npm test

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & build shared
        working-directory: packages/shared
        run: npm ci && npm run build

      - name: Install web deps
        working-directory: apps/web
        run: npm ci

      - name: Build web
        working-directory: apps/web
        run: npm run build
        env:
          VITE_BASE_PATH: /Blitzonsales/
          VITE_API_URL: ''
