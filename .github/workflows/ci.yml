name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install workspace deps
        run: npm ci

      - name: Lint
        run: npm run lint

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & build shared
        working-directory: packages/shared
        run: npm ci && npm run build

      - name: Install API deps
        working-directory: apps/api
        run: npm ci

      - name: Type-check API
        working-directory: apps/api
        run: npx tsc --noEmit

      - name: Run API unit tests
        working-directory: apps/api
        run: npm test

      - name: Build API
        working-directory: apps/api
        run: npm run build

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & build shared
        working-directory: packages/shared
        run: npm ci && npm run build

      - name: Install web deps
        working-directory: apps/web
        run: npm ci

      - name: Build web
        working-directory: apps/web
        run: npm run build
        env:
          VITE_BASE_PATH: /Blitzonsales/
          VITE_API_URL: ''

  migrate-and-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: blitzonsales
          POSTGRES_USER: blitz
          POSTGRES_PASSWORD: blitzdev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://blitz:blitzdev@localhost:5432/blitzonsales
      JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & build shared
        working-directory: packages/shared
        run: npm ci && npm run build

      - name: Install API deps
        working-directory: apps/api
        run: npm ci

      - name: Run migrations against a clean database
        working-directory: apps/api
        run: npm run migration:run

      - name: Seed fixtures
        working-directory: apps/api
        run: npm run seed

      - name: Run end-to-end tests
        working-directory: apps/api
        run: npm run test:e2e
